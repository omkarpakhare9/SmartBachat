name: smart_bachat_mobile
description: SmartBachat - Expense Tracker Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP Requests
  http: ^1.1.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # UI Components
  cupertino_icons: ^1.0.6
  
  # Charts
  fl_chart: ^0.65.0
  
  # Date Formatting
  intl: ^0.18.1
  
  # Image Picker
  image_picker: ^1.0.5
  
  # File Handling
  path_provider: 2.0.15
  
  # JSON Annotation
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

dependency_overrides:
  path_provider_android: 2.2.1
