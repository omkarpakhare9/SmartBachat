name: Build Android APK

on:
  push:
    branches:
      - claude/smart-bachat-mobile-app-iitjkt
      - main
    paths:
      - 'smart_bachat_mobile/**'
      - '.github/workflows/build-android-apk.yml'
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'Backend API base URL (e.g. https://my-backend.onrender.com/api)'
        required: false
        default: 'https://smartbachat.onrender.com/api'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smart_bachat_mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ github.event.inputs.api_base_url || 'https://smartbachat.onrender.com/api' }}

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/SmartBachat-${{ github.sha }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartBachat-APK
          path: smart_bachat_mobile/build/app/outputs/flutter-apk/SmartBachat-*.apk
          retention-days: 30
          if-no-files-found: error
